<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zoho Mail for Mac — Download</title>
    <meta name="description" content="Download Zoho Mail for macOS — a blazing-fast, native email experience built with SwiftUI.">
    <meta property="og:title" content="Zoho Mail for Mac">
    <meta property="og:description" content="A blazing-fast, native email experience built for macOS.">
    <meta property="og:image" content="https://yuvarajsivah-1993.github.io/zohomail-updates/zohomail_logo.png">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="zohomail_logo.png">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html{height:100%}
        body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Helvetica,Arial,sans-serif;background:#0a0a0f;color:#f0f0f5;overflow-x:hidden}

        /* ── Animated gradient background ── */
        .bg{position:fixed;inset:0;z-index:0;overflow:hidden}
        .bg .orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.35;will-change:transform}
        .bg .orb.a{width:600px;height:600px;background:radial-gradient(circle,#2563eb,#7c3aed);top:-10%;left:-10%;animation:drift-a 18s ease-in-out infinite}
        .bg .orb.b{width:500px;height:500px;background:radial-gradient(circle,#06b6d4,#3b82f6);bottom:-15%;right:-10%;animation:drift-b 22s ease-in-out infinite}
        .bg .orb.c{width:350px;height:350px;background:radial-gradient(circle,#a855f7,#ec4899);top:40%;left:55%;animation:drift-c 15s ease-in-out infinite}
        @keyframes drift-a{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(80px,60px) scale(1.1)}}
        @keyframes drift-b{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-70px,-50px) scale(1.15)}}
        @keyframes drift-c{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,30px) scale(.9)}}

        /* ── Particle canvas ── */
        #particles{position:fixed;inset:0;z-index:1;pointer-events:none}

        /* ── Glass spotlight that follows cursor ── */
        .spotlight{position:fixed;width:400px;height:400px;border-radius:50%;pointer-events:none;z-index:2;background:radial-gradient(circle,rgba(99,102,241,.12) 0%,transparent 70%);transform:translate(-50%,-50%);transition:opacity .4s}

        /* ── Content ── */
        .content{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 20px}

        /* ── Logo icon ── */
        .logo{width:120px;height:120px;border-radius:27px;display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 8px 40px rgba(0,0,0,.3),0 0 60px rgba(99,102,241,.2);animation:float 4s ease-in-out infinite;position:relative;overflow:hidden}
        .logo img{width:120px;height:120px;border-radius:27px;object-fit:cover}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

        h1{font-size:clamp(36px,8vw,56px);font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,#f0f0f5 0%,#a5b4fc 50%,#818cf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
        .tagline{font-size:clamp(16px,3.5vw,20px);color:#9ca3af;margin-bottom:48px;max-width:420px;line-height:1.5}

        /* ── Download button ── */
        .download-btn{
            position:relative;display:inline-flex;align-items:center;gap:10px;
            padding:18px 44px;border-radius:16px;font-size:18px;font-weight:600;
            color:#fff;text-decoration:none;overflow:hidden;
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            box-shadow:0 4px 30px rgba(99,102,241,.4);
            transition:transform .2s,box-shadow .2s;cursor:pointer
        }
        .download-btn:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 8px 40px rgba(99,102,241,.55)}
        .download-btn:active{transform:scale(.98)}
        .download-btn .shimmer{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);animation:shimmer 3s infinite}
        @keyframes shimmer{0%{left:-100%}100%{left:100%}}
        .download-btn svg{width:20px;height:20px;fill:currentColor}
        .file-size{font-size:13px;color:#6b7280;margin-top:8px}

        /* ── Meta info ── */
        .version-badge{display:inline-block;padding:4px 12px;border-radius:20px;border:1px solid rgba(99,102,241,.3);background:rgba(99,102,241,.08);font-size:13px;color:#a5b4fc;margin-top:16px;opacity:0;transition:opacity .3s}
        .version-badge.loaded{opacity:1}
        .requirements{font-size:13px;color:#4b5563;margin-top:12px}

        /* ── Features row ── */
        .features{display:flex;gap:24px;margin-top:52px;flex-wrap:wrap;justify-content:center;padding:0 20px}
        .feature{display:flex;align-items:center;gap:8px;font-size:14px;color:#9ca3af}
        .feature .dot{width:6px;height:6px;border-radius:50%;background:#818cf8;flex-shrink:0}

        /* ── Footer ── */
        .footer{position:relative;z-index:3;text-align:center;padding:24px 20px;font-size:12px;color:#3f3f46}

        /* ── Fade-in animation ── */
        .fade-up{opacity:0;transform:translateY(20px);animation:fade-up .8s ease forwards}
        .fade-up.d1{animation-delay:.1s}
        .fade-up.d2{animation-delay:.25s}
        .fade-up.d3{animation-delay:.4s}
        .fade-up.d4{animation-delay:.55s}
        .fade-up.d5{animation-delay:.7s}
        @keyframes fade-up{to{opacity:1;transform:translateY(0)}}

        /* ── Reduced motion ── */
        @media(prefers-reduced-motion:reduce){
            .bg .orb,.logo,.fade-up{animation:none!important;opacity:1;transform:none}
            .download-btn .shimmer{animation:none}
            #particles,.spotlight{display:none}
        }

        /* ── Mobile ── */
        @media(max-width:480px){
            .logo{width:96px;height:96px;border-radius:22px}
            .logo img{width:96px;height:96px;border-radius:22px}
            .download-btn{padding:16px 32px;font-size:16px}
            .features{gap:16px}
            .bg .orb.a{width:300px;height:300px}
            .bg .orb.b{width:250px;height:250px}
            .bg .orb.c{width:180px;height:180px}
        }
    </style>
</head>
<body>
    <!-- Background orbs -->
    <div class="bg">
        <div class="orb a"></div>
        <div class="orb b"></div>
        <div class="orb c"></div>
    </div>

    <!-- Particle field -->
    <canvas id="particles"></canvas>

    <!-- Cursor spotlight -->
    <div class="spotlight" id="spotlight"></div>

    <!-- Main content -->
    <div class="content">
        <div class="logo fade-up d1">
            <img src="zohomail_logo.png" alt="Zoho Mail" width="120" height="120" />
        </div>
        <h1 class="fade-up d2">Zoho Mail</h1>
        <p class="tagline fade-up d3">A blazing-fast, native email experience built for macOS</p>

        <a class="download-btn fade-up d4" id="downloadLink" href="ZohoMail.dmg" download="ZohoMail.dmg">
            <span class="shimmer"></span>
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            Download for Mac
        </a>
        <p class="file-size fade-up d4">macOS App · <span id="fileSize">~34 MB</span></p>

        <div class="fade-up d4">
            <span class="version-badge" id="versionInfo"></span>
        </div>
        <p class="requirements fade-up d4">Requires macOS 14.0 (Sonoma) or later</p>

        <div class="features fade-up d5">
            <div class="feature"><span class="dot"></span>Lightning-fast SwiftUI</div>
            <div class="feature"><span class="dot"></span>Native macOS experience</div>
            <div class="feature"><span class="dot"></span>Auto-updates via Sparkle</div>
        </div>
    </div>

    <footer class="footer fade-up d5">© 2026 Zoho Corporation. All rights reserved.</footer>

    <script>
    /* ── Cursor spotlight ── */
    (function(){
        var sp=document.getElementById('spotlight');
        var mx=window.innerWidth/2,my=window.innerHeight/2;
        document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY});
        (function loop(){sp.style.left=mx+'px';sp.style.top=my+'px';requestAnimationFrame(loop)})();
    })();

    /* ── Floating particles ── */
    (function(){
        var c=document.getElementById('particles'),ctx=c.getContext('2d');
        var w,h,pts=[];
        function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}
        window.addEventListener('resize',resize);resize();

        for(var i=0;i<80;i++){
            pts.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.5,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,o:Math.random()*.4+.1})
        }
        var mouseX=w/2,mouseY=h/2;
        document.addEventListener('mousemove',function(e){mouseX=e.clientX;mouseY=e.clientY});

        (function draw(){
            ctx.clearRect(0,0,w,h);
            for(var i=0;i<pts.length;i++){
                var p=pts[i];
                /* subtle repel from cursor */
                var ddx=p.x-mouseX,ddy=p.y-mouseY;
                var dist=Math.sqrt(ddx*ddx+ddy*ddy);
                if(dist<150){
                    p.x+=ddx/dist*1.2;
                    p.y+=ddy/dist*1.2;
                }
                p.x+=p.dx;p.y+=p.dy;
                if(p.x<0)p.x=w;if(p.x>w)p.x=0;
                if(p.y<0)p.y=h;if(p.y>h)p.y=0;
                ctx.beginPath();
                ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
                ctx.fillStyle='rgba(165,180,252,'+p.o+')';
                ctx.fill();
            }
            /* draw faint lines between nearby particles */
            for(var i=0;i<pts.length;i++){
                for(var j=i+1;j<pts.length;j++){
                    var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;
                    var d=dx*dx+dy*dy;
                    if(d<12000){
                        ctx.beginPath();
                        ctx.moveTo(pts[i].x,pts[i].y);
                        ctx.lineTo(pts[j].x,pts[j].y);
                        ctx.strokeStyle='rgba(129,140,248,'+(1-d/12000)*.08+')';
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        })();
    })();

    /* ── Tilt effect on button (desktop only) ── */
    (function(){
        if(window.matchMedia('(pointer:fine)').matches){
            var btn=document.getElementById('downloadLink');
            btn.addEventListener('mousemove',function(e){
                var r=btn.getBoundingClientRect();
                var x=(e.clientX-r.left)/r.width-.5;
                var y=(e.clientY-r.top)/r.height-.5;
                btn.style.transform='translateY(-2px) scale(1.03) perspective(600px) rotateX('+(-y*8)+'deg) rotateY('+(x*8)+'deg)';
                btn.style.boxShadow='0 8px 40px rgba(99,102,241,.55)';
            });
            btn.addEventListener('mouseleave',function(){
                btn.style.transform='';
                btn.style.boxShadow='';
            });
        }
    })();

    /* ── Fetch appcast for version info ── */
    fetch('appcast.xml')
        .then(function(r){return r.text()})
        .then(function(xml){
            var doc=new DOMParser().parseFromString(xml,'text/xml');
            var items=doc.querySelectorAll('item');
            if(items.length>0){
                var item=items[0];
                var enc=item.querySelector('enclosure');
                var ns='http://www.andymatuschak.org/xml-namespaces/sparkle';
                var ver=item.getElementsByTagNameNS(ns,'shortVersionString')[0];
                var v=ver?ver.textContent:'';
                if(enc){
                    document.getElementById('downloadLink').href=enc.getAttribute('url');
                    var len=parseInt(enc.getAttribute('length'),10);
                    if(len)document.getElementById('fileSize').textContent=(len/1048576).toFixed(0)+' MB';
                }
                var badge=document.getElementById('versionInfo');
                badge.textContent=v?'Version '+v+' — Latest':'Latest Release';
                badge.classList.add('loaded');
            }
        })
        .catch(function(){
            var badge=document.getElementById('versionInfo');
            badge.textContent='Latest Release';
            badge.classList.add('loaded');
        });
    </script>
</body>
</html>
