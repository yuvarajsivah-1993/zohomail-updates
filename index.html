<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zoho Mail for Mac</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #f5f5f7; color: #1d1d1f; }
        .hero { text-align: center; padding: 80px 20px 60px; }
        .hero h1 { font-size: 48px; font-weight: 700; margin-bottom: 12px; }
        .hero p { font-size: 18px; color: #6e6e73; margin-bottom: 40px; }
        .download-btn { display: inline-block; background: #0071e3; color: #fff; text-decoration: none; padding: 16px 40px; border-radius: 12px; font-size: 18px; font-weight: 600; transition: background 0.2s; }
        .download-btn:hover { background: #0060c0; }
        .meta { font-size: 14px; color: #86868b; margin-top: 16px; }
        .requirements { text-align: center; padding: 20px; font-size: 14px; color: #86868b; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Zoho Mail</h1>
        <p>Fast, native email client for macOS</p>
        <a class="download-btn" id="downloadLink" href="#">Download for Mac</a>
        <p class="meta" id="versionInfo">Checking latest version...</p>
    </div>
    <div class="requirements">Requires macOS 14.0 or later</div>
    <script>
        fetch('appcast.xml')
            .then(function(r) { return r.text(); })
            .then(function(xml) {
                var parser = new DOMParser();
                var doc = parser.parseFromString(xml, 'text/xml');
                var items = doc.querySelectorAll('item');
                if (items.length > 0) {
                    var item = items[0];
                    var enclosure = item.querySelector('enclosure');
                    var versionEl = item.querySelector('shortVersionString');
                    var version = versionEl ? versionEl.textContent : '';
                    if (enclosure) {
                        document.getElementById('downloadLink').href = enclosure.getAttribute('url');
                    }
                    if (version) {
                        document.getElementById('versionInfo').textContent = 'Version ' + version;
                    }
                }
            })
            .catch(function() {
                document.getElementById('versionInfo').textContent = 'No release available yet';
                document.getElementById('downloadLink').style.opacity = '0.5';
                document.getElementById('downloadLink').style.pointerEvents = 'none';
            });
    </script>
</body>
</html>
