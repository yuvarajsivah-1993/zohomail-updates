<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zoho Mail for Mac — Download</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;overflow:hidden}
        body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Helvetica,Arial,sans-serif;background:#0a0a0f;color:#f0f0f5}

        /* ── Animated gradient background ── */
        .bg{position:fixed;inset:0;z-index:0;overflow:hidden}
        .bg .orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.35;will-change:transform}
        .bg .orb.a{width:600px;height:600px;background:radial-gradient(circle,#2563eb,#7c3aed);top:-10%;left:-10%;animation:drift-a 18s ease-in-out infinite}
        .bg .orb.b{width:500px;height:500px;background:radial-gradient(circle,#06b6d4,#3b82f6);bottom:-15%;right:-10%;animation:drift-b 22s ease-in-out infinite}
        .bg .orb.c{width:350px;height:350px;background:radial-gradient(circle,#a855f7,#ec4899);top:40%;left:55%;animation:drift-c 15s ease-in-out infinite}
        @keyframes drift-a{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(80px,60px) scale(1.1)}}
        @keyframes drift-b{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-70px,-50px) scale(1.15)}}
        @keyframes drift-c{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,30px) scale(.9)}}

        /* ── Particle canvas ── */
        #particles{position:fixed;inset:0;z-index:1;pointer-events:none}

        /* ── Glass spotlight that follows cursor ── */
        .spotlight{position:fixed;width:400px;height:400px;border-radius:50%;pointer-events:none;z-index:2;background:radial-gradient(circle,rgba(99,102,241,.12) 0%,transparent 70%);transform:translate(-50%,-50%);transition:opacity .4s}

        /* ── Content ── */
        .content{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center;padding:20px}

        /* ── Logo icon ── */
        .logo{width:120px;height:120px;border-radius:27px;background:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 8px 40px rgba(0,0,0,.3),0 0 60px rgba(99,102,241,.2);animation:float 4s ease-in-out infinite;position:relative;overflow:hidden}
        .logo svg.app-icon{width:80px;height:80px}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

        h1{font-size:56px;font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,#f0f0f5 0%,#a5b4fc 50%,#818cf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
        .tagline{font-size:20px;color:#9ca3af;margin-bottom:48px;max-width:420px;line-height:1.5}

        /* ── Download button ── */
        .download-btn{
            position:relative;display:inline-flex;align-items:center;gap:10px;
            padding:18px 44px;border-radius:16px;font-size:18px;font-weight:600;
            color:#fff;text-decoration:none;overflow:hidden;
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            box-shadow:0 4px 30px rgba(99,102,241,.4);
            transition:transform .2s,box-shadow .2s;cursor:pointer
        }
        .download-btn:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 8px 40px rgba(99,102,241,.55)}
        .download-btn:active{transform:scale(.98)}
        .download-btn .shimmer{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);animation:shimmer 3s infinite}
        @keyframes shimmer{0%{left:-100%}100%{left:100%}}
        .download-btn svg{width:20px;height:20px;fill:currentColor}

        /* ── Meta info ── */
        .meta{font-size:14px;color:#6b7280;margin-top:20px;transition:color .3s}
        .version-badge{display:inline-block;padding:4px 12px;border-radius:20px;border:1px solid rgba(99,102,241,.3);background:rgba(99,102,241,.08);font-size:13px;color:#a5b4fc;margin-top:16px}
        .requirements{font-size:13px;color:#4b5563;margin-top:12px}

        /* ── Features row ── */
        .features{display:flex;gap:40px;margin-top:52px;flex-wrap:wrap;justify-content:center}
        .feature{display:flex;align-items:center;gap:8px;font-size:14px;color:#9ca3af}
        .feature .dot{width:6px;height:6px;border-radius:50%;background:#818cf8;flex-shrink:0}

        /* ── Fade-in animation ── */
        .fade-up{opacity:0;transform:translateY(20px);animation:fade-up .8s ease forwards}
        .fade-up.d1{animation-delay:.1s}
        .fade-up.d2{animation-delay:.25s}
        .fade-up.d3{animation-delay:.4s}
        .fade-up.d4{animation-delay:.55s}
        .fade-up.d5{animation-delay:.7s}
        @keyframes fade-up{to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>
    <!-- Background orbs -->
    <div class="bg">
        <div class="orb a"></div>
        <div class="orb b"></div>
        <div class="orb c"></div>
    </div>

    <!-- Particle field -->
    <canvas id="particles"></canvas>

    <!-- Cursor spotlight -->
    <div class="spotlight" id="spotlight"></div>

    <!-- Main content -->
    <div class="content">
        <div class="logo fade-up d1">
            <svg class="app-icon" viewBox="0 0 691 691" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Blue mail outline -->
                <path d="M667.212 238.835L383.317 13.5969C372.572 5.08203 359.056 0.351562 345.338 0.351562C331.62 0.351562 318.104 5.08203 307.359 13.5969L23.5309 238.767C8.86641 250.458 0.419141 267.893 0.419141 286.612V355.812C0.419141 378.451 12.7859 399.13 32.7891 409.74L316.685 560.709C334.661 570.305 356.083 570.305 374.059 560.709L555.709 463.938L556.993 463.262C566.791 457.991 570.576 445.759 565.305 435.893C560.034 426.094 547.802 422.309 537.936 427.58L527.258 433.257L355.002 525.028C348.92 528.272 341.689 528.272 335.607 525.028L51.7109 374.059C44.9531 370.409 40.7633 363.449 40.7633 355.812V286.612C40.7633 280.26 43.6691 274.381 48.6023 270.461L332.498 45.291C340.067 39.2766 350.609 39.2766 358.178 45.291L641.938 270.529C646.939 274.448 649.777 280.328 649.777 286.68V628.963C649.777 640.316 640.519 649.575 629.166 649.575H61.3746C50.0215 649.575 40.7633 640.316 40.7633 628.963V467.654C40.7633 456.504 31.7078 447.448 20.5574 447.448C9.40703 447.448 0.351562 456.504 0.351562 467.654V628.963C0.351562 662.685 27.7883 690.054 61.4422 690.054H629.234C662.887 690.054 690.257 662.617 690.324 628.963V286.68C690.324 267.893 681.877 250.458 667.212 238.835Z" fill="#226DB4"/>
                <!-- Yellow envelope -->
                <g transform="translate(123, 274)">
                    <path d="M431.753 3.33203L227.045 128.887C224.173 130.648 220.501 130.648 217.629 128.887L12.9218 3.33203C10.8538 2.0623 8.48755 1.38467 6.07155 1.37109H5.32936C2.58401 1.37109 0.351562 3.60354 0.351562 6.34889V184.012C0.351562 187.107 2.86061 189.616 5.95561 189.616H438.736C441.831 189.616 444.34 187.107 444.34 184.012V6.27734C444.34 3.53199 442.107 1.29954 439.362 1.29954H438.603C436.19 1.31603 433.827 1.99479 431.753 3.33203Z" fill="#F9B21D"/>
                </g>
            </svg>
        </div>
        <h1 class="fade-up d2">Zoho Mail</h1>
        <p class="tagline fade-up d3">A blazing-fast, native email experience built for macOS</p>

        <a class="download-btn fade-up d4" id="downloadLink" href="ZohoMail.dmg">
            <span class="shimmer"></span>
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            Download for Mac
        </a>

        <div class="fade-up d4">
            <span class="version-badge" id="versionInfo">Checking latest version...</span>
        </div>
        <p class="requirements fade-up d4">Requires macOS 14.0 (Sonoma) or later</p>

        <div class="features fade-up d5">
            <div class="feature"><span class="dot"></span>Lightning-fast SwiftUI</div>
            <div class="feature"><span class="dot"></span>Native macOS experience</div>
            <div class="feature"><span class="dot"></span>Auto-updates via Sparkle</div>
        </div>
    </div>

    <script>
    /* ── Cursor spotlight ── */
    (function(){
        var sp=document.getElementById('spotlight');
        var mx=window.innerWidth/2,my=window.innerHeight/2;
        document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY});
        (function loop(){sp.style.left=mx+'px';sp.style.top=my+'px';requestAnimationFrame(loop)})();
    })();

    /* ── Floating particles ── */
    (function(){
        var c=document.getElementById('particles'),ctx=c.getContext('2d');
        var w,h,pts=[];
        function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}
        window.addEventListener('resize',resize);resize();

        for(var i=0;i<80;i++){
            pts.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.5,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,o:Math.random()*.4+.1})
        }
        var mouseX=w/2,mouseY=h/2;
        document.addEventListener('mousemove',function(e){mouseX=e.clientX;mouseY=e.clientY});

        (function draw(){
            ctx.clearRect(0,0,w,h);
            for(var i=0;i<pts.length;i++){
                var p=pts[i];
                /* subtle repel from cursor */
                var ddx=p.x-mouseX,ddy=p.y-mouseY;
                var dist=Math.sqrt(ddx*ddx+ddy*ddy);
                if(dist<150){
                    p.x+=ddx/dist*1.2;
                    p.y+=ddy/dist*1.2;
                }
                p.x+=p.dx;p.y+=p.dy;
                if(p.x<0)p.x=w;if(p.x>w)p.x=0;
                if(p.y<0)p.y=h;if(p.y>h)p.y=0;
                ctx.beginPath();
                ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
                ctx.fillStyle='rgba(165,180,252,'+p.o+')';
                ctx.fill();
            }
            /* draw faint lines between nearby particles */
            for(var i=0;i<pts.length;i++){
                for(var j=i+1;j<pts.length;j++){
                    var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;
                    var d=dx*dx+dy*dy;
                    if(d<12000){
                        ctx.beginPath();
                        ctx.moveTo(pts[i].x,pts[i].y);
                        ctx.lineTo(pts[j].x,pts[j].y);
                        ctx.strokeStyle='rgba(129,140,248,'+(1-d/12000)*.08+')';
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        })();
    })();

    /* ── Tilt effect on button ── */
    (function(){
        var btn=document.getElementById('downloadLink');
        btn.addEventListener('mousemove',function(e){
            var r=btn.getBoundingClientRect();
            var x=(e.clientX-r.left)/r.width-.5;
            var y=(e.clientY-r.top)/r.height-.5;
            btn.style.transform='translateY(-2px) scale(1.03) perspective(600px) rotateX('+(-y*8)+'deg) rotateY('+(x*8)+'deg)';
        });
        btn.addEventListener('mouseleave',function(){
            btn.style.transform='';
        });
    })();

    /* ── Fetch appcast for version info ── */
    fetch('appcast.xml')
        .then(function(r){return r.text()})
        .then(function(xml){
            var doc=new DOMParser().parseFromString(xml,'text/xml');
            var items=doc.querySelectorAll('item');
            if(items.length>0){
                var item=items[0];
                var enc=item.querySelector('enclosure');
                var ver=item.querySelector('shortVersionString');
                var v=ver?ver.textContent:'';
                if(enc)document.getElementById('downloadLink').href=enc.getAttribute('url');
                if(v)document.getElementById('versionInfo').textContent='Version '+v+' — Latest';
            }
        })
        .catch(function(){
            document.getElementById('versionInfo').textContent='Coming soon';
            document.getElementById('downloadLink').style.opacity='.5';
            document.getElementById('downloadLink').style.pointerEvents='none';
        });
    </script>
</body>
</html>
